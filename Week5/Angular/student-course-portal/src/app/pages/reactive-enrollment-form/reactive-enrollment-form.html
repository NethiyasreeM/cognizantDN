

<form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">
 <h2>Reactive Enrollment Form</h2>
  <!-- Student Name -->
  <div class="form-group">

    <label for="studentName">Student Name</label>

    <input
      id="studentName"
      type="text"
      formControlName="studentName"
      placeholder="Enter your name">

    <span
      class="error"
      *ngIf="enrollForm.get('studentName')?.touched &&
             enrollForm.get('studentName')?.errors?.['required']">

      Student Name is required.

    </span>

    <span
      class="error"
      *ngIf="enrollForm.get('studentName')?.touched &&
             enrollForm.get('studentName')?.errors?.['minlength']">

      Minimum 3 characters required.

    </span>

  </div>

  <!-- Email -->
  <div class="form-group">

    <label for="studentEmail">Email</label>

    <input
      id="studentEmail"
      type="email"
      formControlName="studentEmail"
      placeholder="Enter your email">

    <span
      class="error"
      *ngIf="enrollForm.get('studentEmail')?.touched &&
             enrollForm.get('studentEmail')?.errors?.['required']">

      Email is required.

    </span>

    <span
      class="error"
      *ngIf="enrollForm.get('studentEmail')?.touched &&
             enrollForm.get('studentEmail')?.errors?.['email']">

      Enter a valid email.

    </span>

    <span
      class="error"
      *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">

      Email already taken.

    </span>

  </div>

  <!-- Course ID -->
  <div class="form-group">

    <label for="courseId">Course ID</label>

    <input
      id="courseId"
      type="text"
      formControlName="courseId"
      placeholder="Example: ANG101">

    <span
      class="error"
      *ngIf="enrollForm.get('courseId')?.touched &&
             enrollForm.get('courseId')?.errors?.['required']">

      Course ID is required.

    </span>

    <span
      class="error"
      *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">

      Course code starting with XX is not allowed.

    </span>

  </div>

  <!-- Preferred Semester -->
  <div class="form-group">

    <label for="preferredSemester">Preferred Semester</label>

    <select
      id="preferredSemester"
      formControlName="preferredSemester">

      <option value="Odd">Odd</option>
      <option value="Even">Even</option>

    </select>

  </div>

  <!-- Agree to Terms -->

  <div class="checkbox-group">

    <input
      id="agreeToTerms"
      type="checkbox"
      formControlName="agreeToTerms">

    <label for="agreeToTerms">
      I Agree to Terms & Conditions
    </label>

  </div>

  <span
    class="error"
    *ngIf="enrollForm.get('agreeToTerms')?.touched &&
           enrollForm.get('agreeToTerms')?.errors?.['required']">

    You must accept the terms.

  </span>

  <hr>

  <h3>Additional Courses</h3>

  <div
    class="additional-course"
    *ngFor="let ctrl of additionalCourses.controls; let i=index">

    <input
      [id]="'additionalCourse'+i"
      [formControl]="ctrl"
      placeholder="Additional Course">

    <button
      class="remove-btn"
      type="button"
      (click)="removeCourse(i)">

      Remove

    </button>

  </div>

  <button
    class="add-btn"
    type="button"
    (click)="addCourse()">

    + Add Another Course

  </button>

  <br><br>

  <button
    type="submit"
    [disabled]="enrollForm.invalid">

    Submit

  </button>

</form>
